services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: uch-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: uch_dev
      POSTGRES_USER: uch_user
      POSTGRES_PASSWORD: uch_password
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uch_user -d uch_dev"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Next.js Application
  app:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: uch-app
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads  # 将来の画像アップロード用

volumes:
  postgres_data:
    driver: local

networks:
  default:
    driver: bridge
