services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: uch-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: uch_dev
      POSTGRES_USER: uch_user
      POSTGRES_PASSWORD: uch_password
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uch_user -d uch_dev"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Next.js Application
  app:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: uch-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://uch_user:uch_password@db:5432/uch_dev?schema=public
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-nextauth_production_secret_2025_secure_key_uch}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - LINE_CHANNEL_ID=${LINE_CHANNEL_ID}
      - LINE_CHANNEL_SECRET=${LINE_CHANNEL_SECRET}
      - EMAIL_SERVER_HOST=${EMAIL_SERVER_HOST:-smtp.gmail.com}
      - EMAIL_SERVER_PORT=${EMAIL_SERVER_PORT:-587}
      - EMAIL_SERVER_USER=${EMAIL_SERVER_USER}
      - EMAIL_SERVER_PASSWORD=${EMAIL_SERVER_PASSWORD}
      - EMAIL_FROM=${EMAIL_FROM}
      - NEXT_PUBLIC_SITE_PASSWORD=${NEXT_PUBLIC_SITE_PASSWORD:-きぼう}
      - NEXT_PUBLIC_SKIP_AUTH # .env.localから読み込む
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads  # 将来の画像アップロード用

volumes:
  postgres_data:
    driver: local

networks:
  default:
    driver: bridge
