services:
  # PostgreSQL Database  
  db:
    image: postgres:16-alpine
    container_name: uch_db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=uch_prod
      - POSTGRES_USER=uch_user
      - POSTGRES_PASSWORD=uch_password
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256 --auth-local=scram-sha-256
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups/db:/backups
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uch_user -d uch_prod"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Next.js Application
  app:
    image: ghcr.io/masa162/uch:latest # デプロイ時にコミットSHAタグに置き換えてください
    container_name: uch_app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://uch_user:uch_password@db:5432/uch_prod?schema=public
      - GOOGLE_CLIENT_ID=928722754697-albetj2ltu754a5eou52mrailmcsi0p8.apps.googleusercontent.com
      - GOOGLE_CLIENT_SECRET=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
      - LINE_CHANNEL_ID=2007898798
      - LINE_CHANNEL_SECRET=51b66feb55b7c3e1ab99c5e046957f59
      - LINE_CLIENT_ID=2007898798
      - LINE_CLIENT_SECRET=51b66feb55b7c3e1ab99c5e046957f59
      - NEXTAUTH_SECRET=S7D71Rz4zcHEKjHaCQIa/vlBbOWFrx5EeuNwSS3gOoU=
      - NEXTAUTH_URL=https://uchinokiroku.com
      - NEXT_PUBLIC_SITE_PASSWORD=きぼう
      - NEXT_PUBLIC_SKIP_AUTH=false
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "const http = require('http'); const options = { hostname: 'localhost', port: 3000, path: '/api/health', timeout: 5000 }; const req = http.request(options, (res) => { process.exit(res.statusCode === 200 ? 0 : 1) }); req.on('error', () => process.exit(1)); req.end();"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx Reverse Proxy (if needed)
  nginx:
    image: nginx:alpine
    container_name: uch_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local

networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16