services:
  # Next.js Application
  app:
    image: ghcr.io/masa162/uch:latest # デプロイ時にコミットSHAタグに置き換えてください
    container_name: uch_app
    restart: always
    environment:
      - NODE_ENV=production
      # 本番環境の環境変数 (.env.productionから移行)
      - DATABASE_URL=postgresql://uch_user:uch_password@db_host:5432/uch_prod?schema=public
      - GOOGLE_CLIENT_ID=928722754697-albetj2ltu754a5eou52mrailmcsi0p8.apps.googleusercontent.com
      - GOOGLE_CLIENT_SECRET=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
      - LINE_CHANNEL_ID=2007898798
      - LINE_CHANNEL_SECRET=51b66feb55b7c3e1ab99c5e046957f59
      - LINE_CLIENT_ID=2007898798
      - LINE_CLIENT_SECRET=51b66feb55b7c3e1ab99c5e046957f59
      - NEXTAUTH_SECRET=S7D71Rz4zcHEKjHaCQIa/vlBbOWFrx5EeuNwSS3gOoU=
      - NEXTAUTH_URL=https://uchinokiroku.com
      - NEXT_PUBLIC_SITE_PASSWORD=きぼう
      - NEXT_PUBLIC_SKIP_AUTH=false
      # 以下は本番環境で適切な値を設定してください
      - EMAIL_SERVER_USER=${EMAIL_SERVER_USER}
      - EMAIL_SERVER_PASSWORD=${EMAIL_SERVER_PASSWORD}
      - EMAIL_FROM=${EMAIL_FROM}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
    ports:
      - "127.0.0.1:3000:3000" # Nginxからのみアクセス可能にするため、ローカルホストにバインド
    volumes:
      - ./uploads:/app/uploads # 必要に応じて永続化ボリュームを設定
    healthcheck:
      test: ["CMD", "node", "-e", "const http = require('http'); const options = { hostname: 'localhost', port: 3000, path: '/api/health', timeout: 5000 }; const req = http.request(options, (res) => { process.exit(res.statusCode === 200 ? 0 : 1) }); req.on('error', () => process.exit(1)); req.end();"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  default:
    driver: bridge
