name: Enhanced Deploy to VPS

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        continue-on-error: false

      - name: Build application
        run: npm run build
        continue-on-error: false

  build:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Force Clean Deploy
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "🧹 Starting Force Clean Deploy..."
            
            cd /opt/uchi
            
            # Force stop all containers and clean environment
            echo "🛑 Stopping all containers..."
            docker compose down --remove-orphans || true
            docker compose -f docker-compose.prod.yml down --remove-orphans || true
            
            # Kill any remaining processes on port 3000
            echo "🔪 Killing processes using port 3000..."
            pkill -f 'next-server' || true
            pkill -f 'node.*3000' || true
            sudo fuser -k 3000/tcp || true
            
            # Clean Docker environment
            echo "🧼 Cleaning Docker environment..."
            docker system prune -af
            docker volume prune -f
            
            # Wait for port to be completely freed
            echo "⏱️ Waiting for port 3000 to be freed..."
            timeout=30
            while [ $timeout -gt 0 ]; do
                if ! ss -tulpn | grep -q :3000; then
                    echo "✅ Port 3000 is now free"
                    break
                fi
                echo "⏳ Port 3000 still in use, waiting... ($timeout seconds left)"
                sleep 2
                timeout=$((timeout - 2))
            done
            
            echo "✨ Clean environment ready for deployment!"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "🚀 Starting deployment..."
            
            cd /opt/uchi
            
            echo "🔐 Logging in to registry..."
            echo ${{ secrets.CR_PAT }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            echo "📦 Pulling new image..."
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            
            echo "🔧 Updating environment variables..."
            # Always recreate .env file with complete configuration
            echo "DATABASE_URL=\"postgresql://postgres:password@db:5432/uch_db\"" > .env
            echo "" >> .env
            echo "# PostgreSQL Configuration" >> .env
            echo "POSTGRES_DB=uch_db" >> .env
            echo "POSTGRES_USER=postgres" >> .env
            echo "POSTGRES_PASSWORD=password" >> .env
            echo "" >> .env
            echo "# NextAuth Configuration" >> .env
            echo "NEXTAUTH_SECRET=\"$(openssl rand -base64 32)\"" >> .env
            echo "NEXTAUTH_URL=\"https://uchinokiroku.com\"" >> .env
            echo "" >> .env
            echo "# OAuth Providers Configuration" >> .env
            echo "GOOGLE_CLIENT_ID=\"${{ secrets.GOOGLE_CLIENT_ID }}\"" >> .env
            echo "GOOGLE_CLIENT_SECRET=\"${{ secrets.GOOGLE_CLIENT_SECRET }}\"" >> .env
            echo "LINE_CHANNEL_ID=\"${{ secrets.LINE_CHANNEL_ID }}\"" >> .env
            echo "LINE_CHANNEL_SECRET=\"${{ secrets.LINE_CHANNEL_SECRET }}\"" >> .env
            
            echo "🚢 Starting deployment process..."
            
            # --- Production docker-compose setup ---
            echo "📝 Creating production docker-compose file..."
            echo "version: '3.8'" > docker-compose.prod.yml
            echo "" >> docker-compose.prod.yml
            echo "services:" >> docker-compose.prod.yml
            echo "  app:" >> docker-compose.prod.yml
            echo "    image: ghcr.io/masa162/uch:latest" >> docker-compose.prod.yml
            echo "    container_name: my-app-container" >> docker-compose.prod.yml
            echo "    ports:" >> docker-compose.prod.yml
            echo "      - \"3000:3000\"" >> docker-compose.prod.yml
            echo "    env_file:" >> docker-compose.prod.yml
            echo "      - .env" >> docker-compose.prod.yml
            echo "    depends_on:" >> docker-compose.prod.yml
            echo "      - db" >> docker-compose.prod.yml
            echo "    restart: unless-stopped" >> docker-compose.prod.yml
            echo "" >> docker-compose.prod.yml
            echo "  db:" >> docker-compose.prod.yml
            echo "    image: postgres:16-alpine" >> docker-compose.prod.yml
            echo "    container_name: my-db-container" >> docker-compose.prod.yml
            echo "    volumes:" >> docker-compose.prod.yml
            echo "      - db-data:/var/lib/postgresql/data" >> docker-compose.prod.yml
            echo "    env_file:" >> docker-compose.prod.yml
            echo "      - .env" >> docker-compose.prod.yml
            echo "    restart: always" >> docker-compose.prod.yml
            echo "" >> docker-compose.prod.yml
            echo "volumes:" >> docker-compose.prod.yml
            echo "  db-data:" >> docker-compose.prod.yml
            
            # --- Enhanced Clean Deployment Process ---
            # Environment is already cleaned by Force Clean Deploy step
            echo "🔄 Proceeding with clean deployment process..."

            # クリーンな状態でアプリケーションを起動
            echo "✨ Starting new services..."
            docker compose -f docker-compose.prod.yml up -d
            
            echo "🧼 Post-deployment cleanup..."
            # Remove unused images (keeping recent ones for rollback)
            docker image prune -f --filter "until=24h"
            
            # Verify containers are running
            echo "🔍 Verifying container status..."
            docker compose -f docker-compose.prod.yml ps
            
            echo "🎉 Clean deployment completed successfully!"

      - name: Verify Deployment
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Final verification
            echo "🔍 Running post-deployment verification..."
            
            # Check container status
            docker ps --filter "name=my-" --format "table {{.Names}}\t{{.Status}}"
            
            # Test application endpoints with retry
            echo "🏥 Testing health endpoint..."
            for i in {1..5}; do
                if curl -s -f http://localhost:3000/api/health; then
                    echo "✅ Health check passed on attempt $i"
                    break
                elif [ $i -eq 5 ]; then
                    echo "❌ Health check failed after 5 attempts"
                    exit 1
                else
                    echo "⏳ Health check failed, retrying in 10s... (attempt $i/5)"
                    sleep 10
                fi
            done
            
            echo "🌐 Testing main page..."
            curl -s -f http://localhost:3000/ > /dev/null || exit 1
            
            echo "📝 Testing essays page..."
            curl -s -f http://localhost:3000/essays > /dev/null || exit 1
            
            echo "✅ All verification tests passed!"

  notify:
    needs: [test, build, deploy]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Notify Success
        if: needs.deploy.result == 'success'
        run: |
          echo "🎉 Deployment successful for commit ${{ github.sha }}"
          # Here you can add Discord/Slack/Email notifications
          
      - name: Notify Failure
        if: needs.deploy.result == 'failure'
        run: |
          echo "❌ Deployment failed for commit ${{ github.sha }}"
          # Here you can add Discord/Slack/Email notifications