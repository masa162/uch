name: Enhanced Deploy to VPS

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        continue-on-error: false

      - name: Build application
        run: npm run build
        continue-on-error: false

  build:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true

          script: |
            set -e
            
            echo "🚀 Starting deployment..."
            
            cd ${{ secrets.VPS_PROJECT_PATH }}
            
            echo "🔐 Logging in to registry..."
            echo ${{ secrets.CR_PAT }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            echo "📦 Pulling new image..."
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            
            echo "🔧 Updating environment variables..."
            # Ensure PostgreSQL environment variables are set
            if ! grep -q "POSTGRES_PASSWORD" .env 2>/dev/null; then
                echo "DATABASE_URL=\"postgresql://postgres:password@db:5432/uch_db\"" > .env.tmp
                echo "" >> .env.tmp
                echo "# PostgreSQL Configuration" >> .env.tmp
                echo "POSTGRES_DB=uch_db" >> .env.tmp
                echo "POSTGRES_USER=postgres" >> .env.tmp
                echo "POSTGRES_PASSWORD=password" >> .env.tmp
                echo "" >> .env.tmp
                # Append existing .env content if it exists
                if [ -f .env ]; then
                    tail -n +2 .env >> .env.tmp
                fi
                mv .env.tmp .env
            fi
            
            echo "🚢 Starting deployment process..."
            
            # --- Production docker-compose setup ---
            echo "📝 Creating production docker-compose file..."
            cat > docker-compose.prod.yml << 'EOF'
version: '3.8'

services:
  app:
    image: ghcr.io/masa162/uch:latest
    container_name: my-app-container
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: my-db-container
    volumes:
      - db-data:/var/lib/postgresql/data
    env_file:
      - .env
    restart: always

volumes:
  db-data:
EOF

            # --- 最終版クリーンアップ処理 ---
            # 1. 関連するコンテナと孤児コンテナをすべて停止・削除
            echo "🛑 Stopping all related services..."
            docker compose -f docker-compose.prod.yml down --remove-orphans || true

            # 2. ポート3000を使用中のプロセスを強制終了
            echo "🔪 Killing processes using port 3000..."
            sudo fuser -k 3000/tcp || true
            
            # 3. ポートが完全に解放されるまで待機
            echo "⏱️ Waiting for port to be completely freed..."
            timeout=30
            while [ $timeout -gt 0 ]; do
                if ! ss -tulpn | grep -q :3000; then
                    echo "✅ Port 3000 is now free"
                    break
                fi
                echo "⏳ Port 3000 still in use, waiting... ($timeout seconds left)"
                sleep 2
                timeout=$((timeout - 2))
            done
            
            if ss -tulpn | grep -q :3000; then
                echo "❌ Warning: Port 3000 still in use after timeout"
                ss -tulpn | grep :3000
            fi
            # ------------------------------------

            # クリーンな状態でアプリケーションを起動
            echo "✨ Starting new services..."
            docker compose -f docker-compose.prod.yml up -d
            
            echo "🧼 Cleaning up old images..."
            docker image prune -f
            
            echo "🎉 Deployment completed successfully!"

      - name: Verify Deployment
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Final verification
            echo "🔍 Running post-deployment verification..."
            
            # Check container status
            docker ps --filter "name=my-" --format "table {{.Names}}\t{{.Status}}"
            
            # Test application endpoints with retry
            echo "🏥 Testing health endpoint..."
            for i in {1..5}; do
                if curl -s -f http://localhost:3000/api/health; then
                    echo "✅ Health check passed on attempt $i"
                    break
                elif [ $i -eq 5 ]; then
                    echo "❌ Health check failed after 5 attempts"
                    exit 1
                else
                    echo "⏳ Health check failed, retrying in 10s... (attempt $i/5)"
                    sleep 10
                fi
            done
            
            echo "🌐 Testing main page..."
            curl -s -f http://localhost:3000/ > /dev/null || exit 1
            
            echo "📝 Testing essays page..."
            curl -s -f http://localhost:3000/essays > /dev/null || exit 1
            
            echo "✅ All verification tests passed!"

  notify:
    needs: [test, build, deploy]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Notify Success
        if: needs.deploy.result == 'success'
        run: |
          echo "🎉 Deployment successful for commit ${{ github.sha }}"
          # Here you can add Discord/Slack/Email notifications
          
      - name: Notify Failure
        if: needs.deploy.result == 'failure'
        run: |
          echo "❌ Deployment failed for commit ${{ github.sha }}"
          # Here you can add Discord/Slack/Email notifications