       340 +  ## 12. トラブルシューティング履歴
       341 +  
       342 +  ### 12.1 ポート3000競合問題 (2025-08-24)
       343 +  
       344 +  **問題概要:**
       345 +  デプロイ時に「address already in use」エラーが発生し、コンテナ起動に失敗。
       346 +  
       347 +  **原因分析:**
       348 +  - VPS上でnext-server プロセスがポート3000を占有
       349 +  - `docker compose down` だけではプロセスが完全に終了していない
       350 +  - 短い待機時間（5秒）では不十分
       351 +  
       352 +  **解決策実装:**
       353 +  ```bash
       354 +  # 1. ポート占有プロセスの強制終了
       355 +  sudo fuser -k 3000/tcp || true
       356 +  
       357 +  # 2. ポート解放の確認ループ（最大30秒）
       358 +  timeout=30
       359 +  while [ $timeout -gt 0 ]; do
       360 +      if ! ss -tulpn | grep -q :3000; then
       361 +          echo "✅ Port 3000 is now free"
       362 +          break
       363 +      fi
       364 +      sleep 2
       365 +      timeout=$((timeout - 2))
       366 +  done
       367 +  ```
       368 +  
       369 +  ### 12.2 PostgreSQL初期化失敗問題 (2025-08-24)
       370 +  
       371 +  **問題概要:**
       372 +  PostgreSQLコンテナが「Database is uninitialized and superuser password is not 
           + specified」エラーで起動失敗。
       373 +  
       374 +  **原因分析:**
       375 +  - `.env` ファイルに `POSTGRES_PASSWORD` 等の必須環境変数が未定義
       376 +  - `DATABASE_URL` の認証情報が不完全
       377 +  
       378 +  **解決策実装:**
       379 +  ```bash
       380 +  # 環境変数の自動設定
       381 +  if ! grep -q "POSTGRES_PASSWORD" .env 2>/dev/null; then
       382 +      echo "DATABASE_URL=\"postgresql://postgres:password@db:5432/uch_db\"" > .env.tmp
       383 +      echo "POSTGRES_DB=uch_db" >> .env.tmp
       384 +      echo "POSTGRES_USER=postgres" >> .env.tmp
       385 +      echo "POSTGRES_PASSWORD=password" >> .env.tmp
       386 +      # 既存設定の保持
       387 +      tail -n +2 .env >> .env.tmp
       388 +      mv .env.tmp .env
       389 +  fi
       390 +  ```
       391 +  
       392 +  ### 12.3 ヘルスチェック検証問題 (2025-08-24)
       393 +  
       394 +  **問題概要:**
       395 +  - コンテナ名フィルタ (`uch_`) が実際の名前と不一致
       396 +  - ヘルスチェックが単発実行で失敗しやすい
       397 +  
       398 +  **解決策実装:**
       399 +  - フィルタを `name=my-` に修正
       400 +  - ヘルスチェックに5回リトライ機能を追加
       401 +  - PostgreSQL初期化時間を考慮した待機処理
