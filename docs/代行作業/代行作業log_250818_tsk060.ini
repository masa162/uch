⏺ TSK-060: APIアクセス制御の実装 - 完了

  実装内容

  すべての書き込み系APIエンドポイントに Role.GUEST をチェックする権限制御を追加しました：

  対象API（8つ）

  1. POST /api/articles (記事作成)
  2. PUT /api/articles/[slug] (記事更新)
  3. DELETE /api/articles/[slug] (記事削除)
  4. POST /api/articles/[slug]/comments (コメント投稿)
  5. POST /api/articles/[slug]/like (いいね登録)
  6. DELETE /api/articles/[slug]/like (いいね削除)
  7. POST /api/upload (画像アップロード)
  8. PUT /api/profile (プロフィール更新)

  追加した権限チェックロジック

  // ゲストユーザーの書き込み権限チェック
  if (session.user.role === Role.GUEST) {
    return NextResponse.json(
      { message: '権限がありません' },
      { status: 403 }
    )
  }

  検証結果

  - 型チェック: エラーなし
  - ビルド: 正常完了（警告は既存のもので実装とは無関係）

  ゲストユーザーが書き込み系操作を実行しようとした場合、HTTP 403 Forbidden エラーが返されるようにな
  りました。これにより、システムのセキュリティとデータの整合性が確保されます。

