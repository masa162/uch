  2. ゲスト認証プロバイダー追加 (lib/auth.ts)
    - 開発環境・本番環境両方にguest用CredentialsProviderを追加
    - ゲストユーザーが存在しない場合は自動作成する機能を実装
  3. 認証コールバック修正
    - JWTとSessionコールバックにrole情報を追加
    - 既存認証プロバイダーのrole対応も完了
  4. 型安全性の確保
    - TypeScript型チェック完了（エラーなし）
    - ビルドプロセス成功

  検証方法：
  // フロントエンドでゲストログイン
  import { signIn } from 'next-auth/react';
  await signIn('guest');

  // セッション確認
  import { useSession } from 'next-auth/react';
  const { data: session } = useSession();
  console.log(session?.user?.role); // 'GUEST'

  これでsignIn('guest')でゲストとしてログインし、session.user.roleに'GUEST'が設定されるようになりま
  した。

