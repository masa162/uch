● コンテナ環境の自動クリーンアップ戦略

  🎯 問題の本質理解

  管理不足で起きる典型的な問題:
  - 開発過程でテスト用ボリューム・イメージが蓄積
  - デプロイ失敗時の残骸が放置される
  - プロセスの不完全な停止による重複実行

  これは開発チームなら避けられない現象です。 重要なのは
  「発生を前提とした自動化」 です。

  🛠️ 推奨する自動化アプローチ

  1. デプロイ前自動クリーンアップ

  # .github/workflows/deploy.yml に追加
  - name: Clean Environment Before Deploy
    run: |
      ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
        cd /opt/uchi
        docker compose down --remove-orphans
        docker system prune -f
        docker volume prune -f
        pkill -f 'next-server' || true
        pkill -f 'node.*3000' || true
      "

  2. 定期クリーンアップcron設定

  # VPSに設定するcronジョブ
  # 毎日深夜2時に実行
  0 2 * * * /opt/scripts/cleanup-docker.sh

  # cleanup-docker.sh
  #!/bin/bash
  cd /opt/uchi
  docker system prune -f --volumes
  docker image prune -a -f --filter "until=72h"
  docker volume ls -q -f dangling=true | xargs docker volume rm || true

  3. 健康状態監視スクリプト

  # health-check.sh - 異常検知時に自動修復
  #!/bin/bash
  # ポート重複チェック
  if [ $(ps aux | grep -c 'next-server.*3000') -gt 1 ]; then
      pkill -f 'next-server'
      cd /opt/uchi && docker compose restart app
  fi

  # ボリューム肥大化チェック
  VOLUME_SIZE=$(docker system df | grep "Local Volumes" | awk '{print $4}' | sed
  's/[^0-9.]//g')
  if (( $(echo "$VOLUME_SIZE > 5.0" | bc -l) )); then
      docker volume prune -f
  fi

  📋 実装推奨度と優先順位

  🔥 最優先 (すぐ実装)

  1. デプロイワークフローにクリーンアップ追加
  2. 週1回の定期クリーンアップcron

  ⭐ 中期実装

  3. ヘルスチェック監視
  4. ディスク使用量アラート

  💡 長期改善

  5. Infrastructure as Code化
  6. 監視ダッシュボード

  🎖️ 最もコスパが高い解決策

  **「デプロイ時の強制クリーンアップ」**を追加することを強く推奨します：

  # 既存のdeploy workflowに1ステップ追加するだけ
  - name: Force Clean Deploy
    run: |
      ssh root@uchinokiroku.com "
        cd /opt/uchi &&
        docker compose down --remove-orphans &&
        docker system prune -af &&
        docker compose up -d --build
      "

  メリット:
  - 毎回のデプロイでクリーンな状態保証
  - 人的管理不要
  - 今回のような問題の根本予防

  デメリット:
  - デプロイ時間が少し延びる（1-2分程度）

  💰 コスト vs 効果

  | 手法            | 実装コスト | 効果  | 推奨度 |
  |---------------|-------|-----|-----|
  | デプロイ時クリーンアップ  | 低     | 高   | ⭐⭐⭐ |
  | 定期cronクリーンアップ | 中     | 中   | ⭐⭐  |
  | リアルタイム監視      | 高     | 高   | ⭐   |

  結論: まずはデプロイワークフローの1行追加から始めることをお勧めします。これだけ
  で今回のような問題は90%防げます。

