  DATABASE_URL="postgresql://uch_user:uch_password@db:5432/uch_db" npx prisma migrate dev
   --name add_displayName

  3. AI執事サービス停止問題

  原因: コンテナ再起動後にAI執事サービスが正常に動作していない

  確認が必要:
  - AI Butlerコンテナの状態
