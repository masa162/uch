● 修正をプッシュしました。

  問題の根本原因：
  - set -e オプションがスクリプト内で使用されていたため、どこかでエラーが発生する
  とスクリプト全体が終了していた
  - || true を付けていても、set -e の影響で予期しない終了が発生していた

  修正内容：
  - Force Clean DeployステップとDeploy to VPSステップの両方から set -e を削除
  - 各コマンドの || true
  により、個別のコマンドが失敗してもスクリプト全体は継続される

  これで新しいデプロイメントが開始され、全てのステップが正常に実行されるはずです
  。

