● 問題が分かりました。スクリプト内の set -e が原因です。set -e
  は、エラーが発生した際にスクリプトを即座に終了させるオプションです。

  ログを見ると、各コマンドに || true が付いているにも関わらず、何かしらのエラーで
  スクリプトが終了している可能性があります。

● 問題は set -e にあります。Force Clean Deployスクリプトで set -e
  を削除し、より安全なエラーハンドリングに変更しましょう。

