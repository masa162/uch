● 今回の問題と解決の解説をします。

  問題の概要

  GitHub Actionsのデプロイメントワークフローが、「Force Clean Deploy」ステップの
  後に終了してしまい、実際のデプロイメントまで進まない問題が発生していました。

  根本原因

  script_stop: true パラメーターの誤用

  # 問題のあったコード
  - name: Force Clean Deploy
    uses: appleboy/ssh-action@v0.1.10
    with:
      host: ${{ secrets.VPS_HOST }}
      username: ${{ secrets.VPS_USER }}
      key: ${{ secrets.VPS_SSH_KEY }}
      script_stop: true  # ← これが問題
      script: |
        # クリーンアップ処理...

  script_stop: true の動作

  このパラメーターは：
  - スクリプト実行後にSSHセッションを強制終了する
  - プロセスにSIGTERMシグナルを送信して終了させる
  - GitHub ActionsのログでStatus 143 (SIGTERM)として記録される

  修正内容

  script_stop: true を削除

  # 修正後のコード
  - name: Force Clean Deploy
    uses: appleboy/ssh-action@v0.1.10
    with:
      host: ${{ secrets.VPS_HOST }}
      username: ${{ secrets.VPS_USER }}
      key: ${{ secrets.VPS_SSH_KEY }}
      # script_stop: true を削除
      script: |
        # クリーンアップ処理...

  影響範囲

  修正により以下のワークフローステップが正常に実行されるようになります：

  1. ✅ Force Clean Deploy - 環境クリーンアップ
  2. ✅ Deploy to VPS - 実際のデプロイメント
  3. ✅ Verify Deployment - ヘルスチェック

  教訓

  - script_stop: trueは、そのSSHアクションで処理を完結させたい場合のみ使用する
  - 複数のSSHアクションを連続実行する場合は使用しない
  - GitHub Actionsのログで「Process exited with status
  143」が出た場合は、SIGTERMによる終了を疑う

  これで正常にデプロイメントパイプラインが動作するはずです。

