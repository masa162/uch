  ======CMD======
  set -e

  echo "🧹 Starting Force Clean Deploy..."

  cd /opt/uchi

  # Force stop all containers and clean environment
  echo "🛑 Stopping all containers..."
  docker compose down --remove-orphans || true
  docker compose -f docker-compose.prod.yml down --remove-orphans || true

  # Kill any remaining processes on port 3000
  echo "🔪 Killing processes using port 3000..."
  pkill -f 'next-server' || true
  pkill -f 'node.*3000' || true
  sudo fuser -k 3000/tcp || true

  # Clean Docker environment
  echo "🧼 Cleaning Docker environment..."
  docker system prune -af
  docker volume prune -f

  # Wait for port to be completely freed
  echo "⏱️ Waiting for port 3000 to be freed..."
  timeout=30
  while [ $timeout -gt 0 ]; do
      if ! ss -tulpn | grep -q :3000; then
          echo "✅ Port 3000 is now free"
          break
      fi
      echo "⏳ Port 3000 still in use, waiting... ($timeout seconds left)"
      sleep 2
      timeout=$((timeout - 2))
  done

  echo "✨ Clean environment ready for deployment!"

  ======END======
