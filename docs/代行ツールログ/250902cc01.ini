● 🔍 問題の全体像分析

  🌊 問題の連鎖構造

  今回の問題は 3つの段階的な問題 が連鎖的に発生した複合的な障害でした：

  問題① → 問題② → 問題③ → 最終解決

  ---
  📋 問題①: GitHub Secrets設定不備

  何が起こったか

  # GitHub Actions ワークフロー内で
  cd ${{ secrets.VPS_PROJECT_PATH }}
  # → VPS_PROJECT_PATH が未設定のため空文字に
  # → 結果的に間違ったディレクトリでコマンド実行

  根本原因

  - GitHub Secrets に VPS_PROJECT_PATH が設定されていなかった
  - ハードコードを避けて変数化したが、設定を忘れた

  解決方法

  # 修正前
  cd ${{ secrets.VPS_PROJECT_PATH }}

  # 修正後
  cd /opt/uchi

  ---
  📋 問題②: Dockerコンテナ名の競合

● 何が起こったか

  Error: Conflict. The container name "/my-db-container" is already in use

  根本原因

  - 既存のコンテナ（手動デプロイで作成）が残存
  - GitHub Actions の docker-compose.prod.yml と既存の設定で同じコンテナ名使用
  - docker compose down だけでは完全にクリーンアップできていない

  解決方法

  # 修正前: 不完全なクリーンアップ
  docker compose -f docker-compose.prod.yml down --remove-orphans

  # 修正後: 明示的な削除を追加
  docker stop my-app-container my-db-container my-ai-butler-container || true
  docker rm my-app-container my-db-container my-ai-butler-container || true
  docker compose -f docker-compose.prod.yml down --remove-orphans

  ---
  📋 問題③: NextAuth設定不備

  何が起こったか

  [next-auth][error][NO_SECRET] Please define a `secret` in production.

  根本原因

  - 環境変数の設定漏れ: NEXTAUTH_SECRET が未設定
  - 本番用設定の欠如: セキュリティ必須設定の見落とし
  - .env ファイルの不完全性: 認証に必要な環境変数が抜けていた

  設定されていなかった環境変数

  # 不足していた設定
  NEXTAUTH_SECRET=   # 認証トークンの暗号化キー
  NEXTAUTH_URL=      # 認証プロバイダーのコールバックURL

  解決方法

  # セキュアなランダムキー生成
  NEXTAUTH_SECRET="$(openssl rand -base64 32)"
  NEXTAUTH_URL="https://uchinokiroku.com"

  ---
  🎯 なぜこの問題が発生したか？

  1. 環境管理の問題

  - 開発環境と本番環境の設定差異
  - 環境変数のテンプレート化不足
  - デプロイ時の設定チェックリスト不在

  2. テスト不足

  - 本番環境での認証テスト未実施
  - CI/CDパイプラインの段階的テスト不足
  - エラーハンドリングの想定不足

  3. ドキュメント化不足

  - デプロイ手順の標準化不備
  - 必須環境変数のドキュメント不在
  - トラブルシューティング手順の未整備

  ---

● 📈 今回の教訓と改善策

  ✅ 実装済みの改善

  1. 自動化の強化

