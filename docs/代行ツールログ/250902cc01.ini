  - ドキュメント化: 手動修正は必ず記録し、自動化に移行

  2. CI/CDの完全性

  # 悪い例: 条件分岐による不確実性
  if [ condition ]; then setup_env; fi

  # 良い例: 冪等性による確実性
  setup_complete_environment  # 毎回同じ結果

