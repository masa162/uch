> ↔では、手順を教えてください。

● 🔧 Google OAuth設定の完全手順

  手順1: Google Cloud Consoleでプロジェクト作成

● 1.1 https://console.cloud.google.com/ にアクセス

  1.2 「新しいプロジェクトを作成」をクリック

  1.3 プロジェクト名を入力（例：uchinokiroku-auth）

  1.4 「作成」をクリック

  ---
  手順2: OAuth同意画面の設定

  2.1 左サイドバーから「APIとサービス」→「OAuth同意画面」を選択

  2.2 ユーザータイプを選択:
  - 外部 を選択（一般ユーザーがログイン可能）
  - 「作成」をクリック

  2.3 OAuth同意画面を設定:
  アプリ名: うちのきろく
  ユーザーサポートメール: あなたのメールアドレス
  承認済みドメイン: uchinokiroku.com
  デベロッパーの連絡先情報: あなたのメールアドレス

  2.4 スコープ設定:
  - 「スコープを追加または削除」をクリック
  - 「../auth/userinfo.email」と「../auth/userinfo.profile」を選択
  - 「更新」をクリック

  2.5 「保存して次へ」を継続してクリックし完了

  ---
  手順3: OAuth 2.0認証情報の作成

  3.1 「認証情報」タブに移動

  3.2 「+ 認証情報を作成」→「OAuth 2.0 クライアントID」を選択

  3.3 アプリケーションの種類:
  - ウェブアプリケーション を選択

  3.4 名前: uchinokiroku-web-client

  3.5 承認済みのリダイレクトURIを追加:
  https://uchinokiroku.com/api/auth/callback/google

  3.6 「作成」をクリック

  3.7 重要:
  表示される「クライアントID」と「クライアントシークレット」をコピーして保存

  ---
  手順4: GitHub Secretsに認証情報を追加

  4.1 GitHubリポジトリ（https://github.com/masa162/uch）にアクセス

  4.2 「Settings」タブ → 「Secrets and variables」→「Actions」

  4.3 「New repository secret」をクリックして以下を追加:

  Name: GOOGLE_CLIENT_ID
  Secret: [手順3.7でコピーしたクライアントID]

  4.4 もう一度「New repository secret」をクリック:

  Name: GOOGLE_CLIENT_SECRET
  Secret: [手順3.7でコピーしたクライアントシークレット]

  ---
  手順5: 設定をテストするための再デプロイ

  5.1 小さな変更をコミット（GitHub Actionsを動作させるため）:

  # READMEに小さな変更を加える
  echo "" >> README.md
  git add README.md
  git commit -m "trigger: Test Google OAuth integration"
  git push origin main

  5.2 GitHub Actionsが完了するまで待機（約5-10分）

  5.3 https://uchinokiroku.com/auth/signin でGoogleログインをテスト

  ---
  ⚠️ よくあるトラブルシューティング

  エラー: "Error 400: redirect_uri_mismatch"

  - Google Cloud Consoleの「承認済みのリダイレクトURI」を確認
  - 正確に https://uchinokiroku.com/api/auth/callback/google
  が設定されているか確認

  エラー: "This app isn't verified"

  - テスト段階では「Advanced」→「Go to [アプリ名] (unsafe)」で進行可能
  - 本格運用時は Google の アプリ確認プロセス が必要

  GitHub Actionsが失敗する場合

  - GitHub Secrets が正しく設定されているか確認
  - Secret名にタイポがないか確認

  ---
  📋 設定確認チェックリスト

  - Google Cloud Console プロジェクト作成
  - OAuth同意画面設定完了
  - OAuth 2.0 クライアント作成
  - 正しいリダイレクトURI設定
  - GitHub Secrets 追加 (GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET)
  - GitHub Actions デプロイ完了
  - Googleログインテスト成功

  この手順で Google OAuth ログインが完全に動作するようになります！

