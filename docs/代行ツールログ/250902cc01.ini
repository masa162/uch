  set -e

  echo "🚀 Starting deployment..."

  cd ***

  echo "🔐 Logging in to registry..."
  echo *** | docker login ghcr.io -u masa162 --password-stdin

  echo "📦 Pulling new image..."
  docker pull ghcr.io/masa162/uch:latest

  echo "🔧 Updating environment variables..."
  # Ensure PostgreSQL environment variables are set
  if ! grep -q "POSTGRES_PASSWORD" .env 2>/dev/null; then
      echo "DATABASE_URL=\"***db:5432/uch_db\"" > .env.tmp
      echo "" >> .env.tmp
      echo "# PostgreSQL Configuration" >> .env.tmp
      echo "POSTGRES_DB=uch_db" >> .env.tmp
      echo "POSTGRES_USER=postgres" >> .env.tmp
      echo "POSTGRES_PASSWORD=password" >> .env.tmp
      echo "" >> .env.tmp
      # Append existing .env content if it exists
      if [ -f .env ]; then
          tail -n +2 .env >> .env.tmp
      fi
      mv .env.tmp .env
  fi

  echo "🚢 Starting deployment process..."

  # --- Production docker-compose setup ---
  echo "📝 Creating production docker-compose file..."
  echo "version: '3.8'" > docker-compose.prod.yml
  echo "" >> docker-compose.prod.yml
  echo "services:" >> docker-compose.prod.yml
  echo "  app:" >> docker-compose.prod.yml
  echo "    image: ghcr.io/masa162/uch:latest" >> docker-compose.prod.yml
  echo "    container_name: my-app-container" >> docker-compose.prod.yml
  echo "    ports:" >> docker-compose.prod.yml
  echo "      - \"3000:3000\"" >> docker-compose.prod.yml
  echo "    env_file:" >> docker-compose.prod.yml
  echo "      - .env" >> docker-compose.prod.yml
  echo "    depends_on:" >> docker-compose.prod.yml
  echo "      - db" >> docker-compose.prod.yml
  echo "    restart: unless-stopped" >> docker-compose.prod.yml
  echo "" >> docker-compose.prod.yml
  echo "  db:" >> docker-compose.prod.yml
  echo "    image: postgres:16-alpine" >> docker-compose.prod.yml
  echo "    container_name: my-db-container" >> docker-compose.prod.yml
  echo "    volumes:" >> docker-compose.prod.yml
  echo "      - db-data:/var/lib/postgresql/data" >> docker-compose.prod.yml
  echo "    env_file:" >> docker-compose.prod.yml
  echo "      - .env" >> docker-compose.prod.yml
  echo "    restart: always" >> docker-compose.prod.yml
  echo "" >> docker-compose.prod.yml
  echo "volumes:" >> docker-compose.prod.yml
  echo "  db-data:" >> docker-compose.prod.yml

  # --- 最終版クリーンアップ処理 ---
  # 1. 関連するコンテナと孤児コンテナをすべて停止・削除
  echo "🛑 Stopping all related services..."
  docker compose -f docker-compose.prod.yml down --remove-orphans || true

  # 2. ポート3000を使用中のプロセスを強制終了
  echo "🔪 Killing processes using port 3000..."
  sudo fuser -k 3000/tcp || true

  # 3. ポートが完全に解放されるまで待機
  echo "⏱️ Waiting for port to be completely freed..."
  timeout=30
  while [ $timeout -gt 0 ]; do
      if ! ss -tulpn | grep -q :3000; then
          echo "✅ Port 3000 is now free"
          break
      fi
      echo "⏳ Port 3000 still in use, waiting... ($timeout seconds left)"
      sleep 2
      timeout=$((timeout - 2))
  done

  if ss -tulpn | grep -q :3000; then
      echo "❌ Warning: Port 3000 still in use after timeout"
      ss -tulpn | grep :3000
  fi
  # ------------------------------------

  # クリーンな状態でアプリケーションを起動
  echo "✨ Starting new services..."
  docker compose -f docker-compose.prod.yml up -d

  echo "🧼 Cleaning up old images..."
  docker image prune -f

  echo "🎉 Deployment completed successfully!"

