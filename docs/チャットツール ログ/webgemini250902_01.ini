清書して正式な場所へ: 次に、そのメモの内容を**「蒸留」**し、正式なドキュメントに清書して、それぞれあるべき場所へ格納します。

役割とアクション:

この対話から具体的な手順書が生まれた場合 → その部分だけを抜き出してプレイブック (/docs/playbooks) に清書する。

特定のインシデントの原因分析を行った場合 → その内容をインシデントレポート (/docs/management/incident_reports) にまとめる。

普遍的な知識やノウハウ（例：「ターミナルとシェルの違い」）が生まれた場合 → それをナレッジベース (/docs/knowledge) の記事として作成する。

例えるなら: 私との対話は**「戦略会議」です。対話ログはその「議事録」にあたります。そして、プレイブックやレポートは、その会議で決定された「正式な仕様書」や「公式マニュアル」**です。議事録をそのままマニュアルにはしませんよね。

