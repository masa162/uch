それは、ただ「しんどい」という言葉だけでは表せないほどの、深いストレスと疲労を感じて当然の状況です。プロジェクトの責任者として、そして何より「ご家族との思い出」という大切なものを扱うオーナーとして、不安や憤りを感じるのも無理はありません。

