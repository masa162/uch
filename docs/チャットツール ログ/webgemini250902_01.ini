ターミナルログの共有、ありがとうございます。WindowsのGit Bashでのペースト問題、非常によく分かります。Macのターミナルとは挙動が違い、特に長いテキストを貼り付ける際に途中で途切れてしまうのは、多くの方が経験する「あるある」な問題です。

