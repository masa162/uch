## いますぐ使える代替案
treeコマンドがなくても、標準で入っているコマンドを組み合わせてフォルダ構成を可視化できます。

1. lsコマンドを使う（シンプル）
これが最も手軽な方法です。treeほど見やすくはありませんが、十分役立ちます。

Bash

