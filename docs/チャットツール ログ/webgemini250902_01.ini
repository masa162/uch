プロジェクトのフォルダ構造を可視化するには、treeコマンドが最適です。

treeコマンドを使うと、ディレクトリとファイルが階層的に表示され、プロジェクト全体の構造を一目で把握できます。

## treeコマンドの使い方
基本的な使い方
ターミナルでプロジェクトのルートディレクトリに移動し、以下のコマンドを実行します。

Bash

tree
これにより、カレントディレクトリ以下のすべてのファイルとフォルダがツリー形式で表示されます。

## おすすめの応用例
開発プロジェクトでは、node_modules や .git といった、共有する必要のない巨大なフォルダが含まれています。これらを除外し、見やすい形に整形するのがおすすめです。

特定のフォルダを除外して表示する
node_modules と .git フォルダを無視し、階層を3階層まで表示するコマンドです。これが最も実用的でよく使われます。

Bash

tree -L 3 -I "node_modules|.git"
-L 3: 表示する階層の深さを3階層に限定します。数字を変えれば深さを調整できます。

-I "...": 指定したパターンに一致するファイルやフォルダを**無視（Ignore）**します。|で区切ることで複数指定できます。

## 結果をファイルに保存する
生成されたツリー構造をファイルに保存しておくと、AIにコンテキストとして共有する際に非常に便利です。

Bash

tree -L 3 -I "node_modules|.git" > project_structure.md
このコマンドを実行すると、project_structure.mdというファイルが作成され、その中にフォルダ構成が書き込まれます。このファイルをVS Codeなどで開き、コピーして私に共有いただけます。

## treeコマンドが使えない場合
もしtreeコマンドがインストールされていない場合は、以下の代替コマンドも利用できます。

lsコマンドを使う (Mac/Linux/Git Bash)
表示はtreeほど綺麗ではありませんが、再帰的にすべてのファイルを表示します。

Bash

ls -R
findコマンドを使う (Mac/Linux/Git Bash)
ファイルとフォルダのパスを一覧で表示します。

Bash

find . -print | sed -e 's;[^/]*/;|____;g;s;____|; |;g'





