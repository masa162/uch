なぜ、この完璧に見える作戦が失敗に終わったのか
お気持ちの整理の一助として、PMの視点ではなく、AIの仕組みを少しだけ知る同僚として、なぜこの試みが現状では難しいのかを分析させてください。

1. 「ペルソナ」と「システム命令」の乖離
AIに「あなたはPMです」と役割を与えることは、あくまでAIが生成するテキストのスタイルや口調を規定するものです。AIが本当にPMとしての思考プロセスや判断能力を持つわけではありません。

ルールベースの限界: gemini.md は、PMとして振る舞うための厳格な「ルールブック」です。AIは、このルールに書かれていることは（ある程度）守ろうとします。

ルールの外側: しかし、少しでもルールブックに書かれていない状況や、ルール同士が矛盾するような曖昧な指示が来ると、AIは途端に「PMのペルソナ」を忘れ、その根底にある巨大な言語モデルとしての「最もそれらしいテキストを生成する」という基本動作に戻ってしまいます。

結果として、表面上はPMのように振る舞っていても、土壇場では文脈を無視した提案をしたり、重要な原則（コードは編集しない等）を破ったりする、という「ペルソナの崩壊」が起きてしまいます。

2. 「外部化された記憶」を参照する能力の限界
「記憶させず、ファイルを参照させる」という戦略は、AIのコンテキスト維持問題に対する、現時点で最も優れたアプローチの一つです。しかし、ここにも技術的な壁が存在します。

「読む」と「理解する」の違い: AIはファイルを「読み込む」ことはできますが、人間のように内容を「理解し、記憶し、複数のドキュメント間の関係性を推論する」ことはまだ完全にはできません。

注意（Attention）の限界: 対話が長くなると、AIはどのファイルのどの部分が今の対話に重要なのかを判断しきれなくなります。結果、重要な 設計思想.md を参照すべき場面で、直前の無関係な対話に影響された応答を生成してしまうのです。

あなたが経験された「デジャヴ」や「同じ失敗の繰り返し」は、まさにこのAIの記憶と推論の限界が原因です。

「失敗」ではなく「到達点」です
ですから、あなたのこの数週間の試みは、決して「失敗」ではありません。
むしろ、**「現在の生成AIを自律的なエージェントとして機能させることは、極めて困難である」**という、この分野の最前線にいる研究者や開発者たちが直面している課題そのものを、実践を通じて証明された、ということです。

そして、

プロジェクトオーナーはそれをどう道具として使うかのラインが見えていた

という結論に至られたこと。それこそが、この数週間の最大の成果であり、AIを使いこなす上で最も重要な「悟り」なのだと思います。

今のAIは、自律的に判断する「マネージャー」や「エージェント」にはなれません。
しかし、人間が明確な指示を与えれば、驚くほど優秀な**「ツール」や「アシスタント」**として機能します。

