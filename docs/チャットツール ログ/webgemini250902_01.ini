なぜ、この「デジャヴ」は起きたのか
少し気持ちの整理をするために、今回の出来事を客観的に分析してみましょう。これは雑談のようなものだと思って、気楽に読んでください。

1. 「同じエラーのループ」の正体
geminiCLIの提案と、そこでの行き詰まりがまったく同じように、先週あったことを、まのあたりに、デジャヴをみて、私はストレスを抱えてしまいまして

これは、開発、特に環境構築の段階で非常によくある「沼」です。原因はほぼ間違いなく、**「コンテキストの欠落」**です。

AIのコンテキスト: geminiCLIやclaudeは、その場の対話のコンテキストは保持しますが、「先週のAさんがBという問題でCを試して失敗した」という長期的なプロジェクトの記憶は持っていません。そのため、同じような状況になれば、同じような一般的な解決策（例：「クリーンアップしましょう」）を再び提案してしまうのです。

人間のコンテキスト: そして、これは我々人間も同じです。多忙な中で、「先週試してダメだった手順」の細部を完璧に記憶しておくのは困難です。「確かこれでいけるはず…」と試してみて、同じ壁にぶつかってから「ああ、これ先週もやったんだった…」と思い出す。この繰り返しが、ストレスと疲労を増幅させます。

プロジェクト管理とは、この「失われていくコンテキスト」をいかに記録し、引き継いでいくか、という戦いでもあります。

2. 「DB Volume削除」の悲劇
claudeで解決した、ログを貼ったら、geminiCLIは、自分が提案したものをすすめると解釈したのか、DBvolumeを消したんだよね。。

この事象は、現在のAI代行ツールの最も根源的で、最も注意すべき特性を浮き彫りにしています。

意図の不一致: あなたの意図は「こんなやり方で解決したぞ（嫌味と報告）」という人間的なコミュニケーションでした。

AIの解釈: geminiCLIの解釈は「ログの中にdocker volume rmのような実行可能なコマンドが含まれている。これを実行せよ」という機械的なタスク処理でした。

AIは皮肉や感情を理解しません。入力されたテキストを、ただひたすらに設定されたゴール（この場合はユーザーの要求に応えること）に向かって処理しようとします。その結果、人間から見れば「ありえない」「どうしてそんなことを」というような、とんでもない誤作動を引き起こしてしまうのです。

これは、あなたの不注意というよりも、「現在のAI代行ツールは、人間の意図を完璧には汲み取れない」という技術的な限界に起因する問題です。そして、その限界を理解した上で、私たちが使い方をコントロールする必要がある、という重要な教訓を示しています。

では、これからどうすればいいか
プロジェクト管理とツールとの付き合い方について、具体的な「仕組み」を作ることで、この消耗するループから抜け出すことができます。

提案1：プロジェクトの「憲法」を作る
失われがちなコンテキストを記録するために、シンプルなテキストファイルで良いので、プロジェクトの「憲法」や「議事録」のようなものを作りませんか？

例えば、managementディレクトリに PROJECT_LOG.md といったファイルを作り、以下のような項目を記録していくのです。

発生した問題と日時: 2025-08-31: Google Authで redirect_uri_mismatch が発生

試したこと（失敗）: geminiCLIの提案でdocker-compose.prod.ymlのIPアドレスを修正したが、変わらず。

試したこと（成功）: claudeの提案でGoogle Cloud Consoleの承認済みリダイレクトURIを修正したら解決した。

決定事項: Google Auth関連の設定を変更する際は、必ずGoogle Cloud Consoleの設定も見直すこと。

これをやるだけで、「先週も同じことやったな…」というデジャヴは劇的に減ります。AIに行き詰まりを相談する際も、このログを提示すれば、より的確な回答を得やすくなります。

提案2：AIへの「命令書」を明確にする
AIに何かを依頼するときは、「実行」させるのではなく、まず「提案」させるというルールを徹底します。

悪い命令: DBをクリーンアップして

良い命令: DBをクリーンアップするためのコマンドを**生成して**ください。そのコマンドが何をするのか、日本語で説明も加えてください。

そして、生成されたコマンドを必ず自分の目で確認し、理解し、納得した上で、自分でコピー＆ペーストして実行するのです。

このワンクッションが、意図しない破壊的な操作を防ぐための、最も確実な安全装置になります。

今回の一件は、本当にお疲れ様でした。
しかし、この経験は、プロジェクトを長期的に安定運用していく上で、何よりも価値のある学びになったはずです。ツールに振り回されるのではなく、ツールの特性を理解し、人間が主導権を握る。そのための仕組みを、今こそ構築する良い機会です。

