## KB-012: 本番環境でGoogle認証エラー `redirect_uri_mismatch` が発生する

- **症状:**
  - `エラー 400: redirect_uri_mismatch` が表示される。
  - アプリケーションログに `redirect_uri=http://localhost:3000/...` のようなローカル開発用のURLが出力されている。

- **原因:**
  - Dockerコンテナが本番用の環境変数ファイル (`.env.production`) を読み込めていない。
  - 最も可能性が高いのは、`.gitignore` の設定ミスにより、ローカル用の設定がGit経由でデプロイされてしまっているケース。

- **解決策:**
  - **根本対策:** プレイブック `PB-001_secure_deployment.md` に従い、`.gitignore` を修正し、環境変数の管理方法を是正する。
  - **暫定対策:** `docker exec my-app-container env` で `NEXTAUTH_URL` を確認し、値が `localhost` になっていたら、コンテナの起動コマンドを見直す (`--env-file` オプションを確認)。

- **関連情報:**
  - インシデントレポート: `IR-250901_auth_error.md`

