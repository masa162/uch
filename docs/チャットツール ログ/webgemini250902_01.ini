# インシデント分析レポート: IR-250901_auth_error

## 1. インシデント概要

- **発生日時:** 2025年9月1日
- **事象:** 本番環境 (https://uchinokiroku.com) でGoogle認証を行うと `エラー 400: redirect_uri_mismatch` が発生し、ログインができない。
- **影響範囲:** 全ユーザーのGoogle認証機能。
- **根本原因:** **`.env.production` が `.gitignore` に含まれておらず、ローカル開発用の設定値 (`NEXTAUTH_URL=http://localhost:3000`) がGitリポジトリにコミットされていた。** そのため、デプロイ時に本番環境の正しい設定が、Git上の古い設定で上書きされ続けていた。

---

## 2. タイムライン（主要な出来事）

- **[日付] [時刻]:** ユーザーより認証エラーの報告。
- **[日付] [時刻]:** Claude Codeによる調査開始。SSH接続に失敗（ユーザー/キーの問題）。
- **[日付] [時刻]:** `root` ユーザーでSSH接続に成功。
- **[日付] [時刻]:** Dockerコンテナのログから、認証URLが `localhost:3000` を参照していることを発見。
- **[日付] [時刻]:** コンテナ内の環境変数を確認し、`NEXTAUTH_URL`が開発用の値になっていることを特定。
- **[日付] [時刻]:** **プロジェクトオーナーの仮説（「Git上の設定ファイルが古いのでは？」）に基づき調査した結果、`.gitignore` の設定不備を発見。これが根本原因であると断定。**
- **[日付] [時刻]:** 恒久対策として `.gitignore` を修正し、Gitの追跡から `.env` ファイルを削除。変更をリポジトリにプッシュし、問題を解決。

---

## 3. 分析と学び (KPT: Keep/Problem/Try)

### Keep (良かった点・続けるべきこと)
- プロジェクトオーナーが「Git上の設定が原因ではないか」と的確な仮説を立てたこと。
- 最終的に根本原因（`.gitignore`）を特定し、恒久対策を打てたこと。

### Problem (問題だった点)
- **[最重要]** `.env` ファイルがバージョン管理されており、機密情報がリポジトリに含まれていた。
- SSHの接続情報（ユーザー名）がドキュメント化されておらず、ログインに手間取った。
- 問題発生のたびに場当たり的な修正（VPS上での直接編集）が行われ、根本原因の解決が遅れた。

### Try (次に試すこと・改善策)
- `.env` ファイルの管理方法を標準化し、手順書を作成する（→ ステップ2へ）。
- SSH接続情報やデプロイ手順を `secure-deployment-guide.md` としてドキュメント化する。
- 全てのインシデントをこのレポート形式で記録し、ナレッジとして蓄積する。
ステップ2：プレイブック（誰でも同じ手順を再現できるようにする）
インシデントレポートで明らかになった課題を元に、具体的な作業手順書＝「プレイブック」を作成します。これにより、将来同じような作業が発生した際に、誰でも・素早く・安全に実行できるようになります。

