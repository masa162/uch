この gemini.md を、役割を変えて活用しませんか？

【変更前】
AIに「君はPMだ」と指示するためのシステムプロンプト

【変更後】
人間である私（プロジェクトオーナー）が、AIという強力だが危険なツールを使う上で、自らに課す**「憲法（マニフェスト）」**

具体的には、以下のように内容を少し書き換えるだけで、最高のドキュメントに生まれ変わります。

1. ファイル名を変更する
gemini.md → ai_interaction_charter.md （AIインタラクション憲章）や development_rules.md （開発ルールブック）のように、人間が読むためのファイルだと分かる名前にします。

2. 視点を「あなた（AI）」から「私（人間）」に書き換える
